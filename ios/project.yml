name: CmuxRemote
options:
  bundleIdPrefix: com.genie
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "2UANJX7ATM"
    CODE_SIGN_STYLE: Automatic
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
packages:
  SharedKit:
    path: ..
  IOSSecuritySuite:
    url: https://github.com/securing/IOSSecuritySuite
    from: "1.9.10"
targets:
  CmuxRemote:
    type: application
    platform: iOS
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: CmuxRemote
        excludes:
          - "Resources/Fonts/LICENSE-*.txt"
    info:
      path: CmuxRemote/Info.plist
      properties:
        CFBundleDisplayName: "cmux Remote"
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes: [cmux]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Mac에서 실행 중인 cmux relay에 연결해 작업공간과 터미널을 원격으로 제어하기 위해 로컬 네트워크 접근이 필요합니다."
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - "DepartureMono-Regular.otf"
          - "GeistMono-Regular.ttf"
          - "GeistMono-Medium.ttf"
          - "GeistMono-Bold.ttf"
    dependencies:
      - package: SharedKit
        product: SharedKit
      - package: IOSSecuritySuite
        product: IOSSecuritySuite
  CmuxRemoteTests:
    type: bundle.unit-test
    platform: iOS
    sources: CmuxRemoteTests
    info:
      path: CmuxRemoteTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
    dependencies:
      - target: CmuxRemote
  CmuxRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: CmuxRemoteUITests
    info:
      path: CmuxRemoteUITests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
    dependencies:
      - target: CmuxRemote
schemes:
  CmuxRemote:
    build:
      targets:
        CmuxRemote: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CmuxRemoteTests
    archive:
      config: Release
